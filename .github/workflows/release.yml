name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: bun install --frozen-lockfile
      - run: bunx tsc --noEmit
      - run: bun test
      - run: bun run build
      - run: ./scripts/smoke-bun-linux-wrapper.sh
      - name: Diagnose npm auth
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          node -e "const token = process.env.NODE_AUTH_TOKEN ?? ''; console.log(JSON.stringify({ length: token.length, startsWithNpm: token.startsWith('npm_'), hasLeadingOrTrailingWhitespace: token !== token.trim(), endsWithNewline: /\\r?\\n$/.test(token) }, null, 2));"
          npm whoami
          npm ping --json
      - uses: changesets/action@v1
        id: changesets
        with:
          version: bunx changeset version
          publish: bun run publish:release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
      - if: steps.changesets.outputs.published == 'true'
        run: bun run verify:published-release $(node -p "require('./packages/npm-wrapper/package.json').version")
